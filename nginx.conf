upstream english_tts {
    server app-index-neural-interface-d9llgd:8000;
}

upstream vietnamese_tts {
    server personal-tts-wyl7uo:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_buffering off;

    location /health {
        default_type application/json;
        return 200 '{"ok":true,"service":"tts-gateway","backends":["en","vi"]}';
    }

    location /en/ {
        rewrite ^/en/(.*) /$1 break;
        proxy_pass http://english_tts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /vi/ {
        rewrite ^/vi/(.*) /$1 break;
        proxy_pass http://vietnamese_tts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}
